spring.application.name=examguide
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Database Configuration
spring.datasource.url=jdbc:h2:file:./data/examguide_db;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
# app.jwtSecret=mySecretKeyForExamGuidePlatformThatIsLongEnoughToBeSecure123456
app.jwtSecret=coCoactPGMi2umWvx/97R5jFBznIPTHGWRYP06zCwMIIMLn4hIzwzBK7QEM3/op0OK8U7FB8yNznUmn7lcI3Ow==
app.jwtExpiration=86400000

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.examguide=DEBUG

# Flyway Configuration (if using Flyway for migrations)
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
